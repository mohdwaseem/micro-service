# Development overrides — exposes each service directly for Scalar UI access
# Run with: docker compose up  (automatically merges with docker-compose.yml)
#
# Service Scalar UIs (dev only):
#   UserService:    http://localhost:5001/scalar
#   ProductService: http://localhost:5002/scalar
#   OrderService:   http://localhost:5003/scalar

services:
  userservice:
    ports:
      - "5001:8080"

  productservice:
    ports:
      - "5002:8080"

  orderservice:
    ports:
      - "5003:8080"

  notificationservice:
    ports: []  # Worker service — no HTTP, nothing to expose
